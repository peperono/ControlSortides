<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ControlSortides</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px}
h1{text-align:center;margin-bottom:24px;color:#00d4ff}
.status{text-align:center;margin-bottom:16px;font-size:14px}
.status .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot.on{background:#0f0}.dot.off{background:#f44}

.outputs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.output-card{background:#16213e;border-radius:8px;padding:10px;min-width:140px;text-align:center;border:2px solid #0f3460}
.output-card.active{border-color:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,.3)}
.output-id{font-size:11px;color:#888;margin-bottom:4px}
.output-state{font-size:20px;font-weight:bold;margin-bottom:4px}
.output-state.on{color:#4caf50}
.output-state.off{color:#666}
.output-detail{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:10px;margin-bottom:8px;text-align:left;padding:0 4px}
.output-detail .label{color:#888}
.output-detail .val{text-align:right;font-weight:600}
.output-detail .val.on{color:#4caf50}.output-detail .val.off{color:#666}
.output-detail .val.remote{color:#ff9800}.output-detail .val.auto{color:#2196f3}
.output-mode{font-size:12px;color:#aaa;margin-bottom:12px}

.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{border:none;border-radius:4px;padding:5px 9px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;background:#00d4ff;color:#000}
.btn:hover{transform:scale(1.05)}
.btn.flash{animation:btn-press .18s ease-out}
@keyframes btn-press{
  0%{transform:translateY(0);box-shadow:0 3px 0 #0077aa}
  40%{transform:translateY(3px);box-shadow:0 0 0 #0077aa,inset 0 2px 4px rgba(0,0,0,.4)}
  100%{transform:translateY(0);box-shadow:0 3px 0 #0077aa}
}
.btn{box-shadow:0 3px 0 #0077aa}

.section{background:#16213e;border-radius:12px;padding:20px;margin-bottom:20px;max-width:600px;margin-left:auto;margin-right:auto}
.section h2{font-size:16px;margin-bottom:12px;color:#00d4ff}
.io-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.io-form label{font-size:14px;min-width:60px}
.io-form input{background:#0f3460;border:1px solid #444;color:#e0e0e0;border-radius:4px;padding:6px 10px;width:70px;font-size:14px}
.io-form select{background:#0f3460;border:1px solid #444;color:#e0e0e0;border-radius:4px;padding:6px 10px;font-size:14px}
.btn-send{padding:10px 24px;font-size:14px;display:block;margin:12px auto 0}

.log{background:#0a0a1a;border-radius:8px;padding:12px;max-height:200px;overflow-y:auto;font-family:monospace;font-size:13px;line-height:1.6;white-space:nowrap;overflow-x:auto}
.log-entry{border-bottom:1px solid #1a1a2e;padding:2px 0}
.log-entry .time{color:#666}
.log-entry .change{color:#4caf50}
</style>
</head>
<body>

<h1>ControlSortides</h1>
<div class="status" id="ws-status"><span class="dot off"></span>Desconnectat</div>

<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;max-width:1400px;margin:0 auto 20px">
  <div class="section" style="flex:0 0 auto;margin:0;min-width:180px;text-align:center">
    <h2>Rellotge</h2>
    <div id="rellotge-time" style="font-size:36px;color:#00d4ff;font-weight:bold;font-family:monospace;letter-spacing:2px">--:--:--</div>
    <div id="rellotge-day" style="font-size:14px;color:#888;margin-top:6px;text-transform:capitalize">---</div>
  </div>

  <div class="section" style="flex:1 1 400px;margin:0">
    <h2>ControlHorari</h2>
    <textarea id="horari-json" spellcheck="false" style="width:100%;height:280px;background:#0a0a1a;color:#e0e0e0;border:1px solid #0f3460;border-radius:8px;padding:10px;font-family:monospace;font-size:12px;resize:vertical"></textarea>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
      <button class="btn btn-send" onclick="loadHorari()" style="margin:0">Carregar</button>
      <button class="btn btn-send" onclick="applyHorari()" style="margin:0">Aplicar</button>
    </div>
  </div>

  <div class="section" style="flex:2 1 600px;margin:0">
    <h2>ControlRemot</h2>
    <div class="outputs" id="outputs"></div>
  </div>
</div>

<div class="section" style="max-width:1400px">
  <h2>Log</h2>
  <div class="log" id="log"></div>
</div>

<script>
document.addEventListener('click', e => {
  const b = e.target.closest('.btn');
  if (!b) return;
  b.classList.remove('flash');
  void b.offsetWidth;
  b.classList.add('flash');
});
const outputsEl = document.getElementById('outputs');
const logEl = document.getElementById('log');
const wsStatus = document.getElementById('ws-status');
let currentState = {};
let lastRenderKey = '';

// ── WebSocket ──────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => {
    wsStatus.innerHTML = '<span class="dot on"></span>Connectat';
  };
  ws.onclose = () => {
    wsStatus.innerHTML = '<span class="dot off"></span>Desconnectat';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      currentState = data.outputs || {};
      if (data.time) {
        document.getElementById('rellotge-time').textContent = data.time;
        document.getElementById('rellotge-day').textContent  = data.day || '';
      }
      const key = JSON.stringify(currentState);
      if (key !== lastRenderKey) {
        lastRenderKey = key;
        renderOutputs();
      }
      if (data.log && data.log.length > 0) {
        for (const entry of data.log) {
          addLog(entry.t, entry.src, entry.sig, entry.d);
        }
      }
    } catch(err) {
      addLog('--:--:--', 'WS', 'parse error', err.message + ' | ' + e.data.substring(0, 200));
    }
  };
}
connect();

// ── Programació (JSON editable) ────────────────────────────────────
function loadHorari() {
  fetch('/horari').then(r => r.text()).then(txt => {
    try {
      document.getElementById('horari-json').value = JSON.stringify(JSON.parse(txt), null, 2);
    } catch {
      document.getElementById('horari-json').value = txt;
    }
  });
}

function applyHorari() {
  const body = document.getElementById('horari-json').value;
  try { JSON.parse(body); }
  catch (e) { alert('JSON invàlid: ' + e.message); return; }
  fetch('/horari', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body
  });
}

loadHorari();

// ── Render sortides ────────────────────────────────────────────────
function renderOutputs() {
  const ids = Object.keys(currentState).map(Number).sort((a,b) => a-b);
  if (ids.length === 0) {
    outputsEl.innerHTML = '<p style="color:#666">Cap sortida registrada</p>';
    return;
  }
  outputsEl.innerHTML = ids.map(id => {
    const o = currentState[id];
    const on = o.result;
    const isRemote = o.mode === 'REMOTE';
    return `
      <div class="output-card ${on ? 'active' : ''}">
        <div class="output-id">Sortida ${id}</div>
        <div class="output-state ${on ? 'on' : 'off'}">${on ? 'ON' : 'OFF'}</div>
        <div class="output-detail">
          <span class="label">Estat a l'entrada:</span><span class="val ${o.state?'on':'off'}">${o.state?'ON':'OFF'}</span>
          <span class="label">Última comanda:</span><span class="val ${o.commanded?'on':'off'}">${o.commanded?'ON':'OFF'}</span>
          <span class="label">Mode:</span><span class="val ${isRemote?'remote':'auto'}">${o.mode}</span>
        </div>
        <div class="controls">
          <button class="btn btn-on" onclick="ctrlAction(${id},'activate')">ON</button>
          <button class="btn btn-off" onclick="ctrlAction(${id},'deactivate')">OFF</button>
          <button class="btn ${isRemote?'btn-remote':'btn-auto'}" onclick="ctrlAction(${id},${isRemote?"'set_auto'":"'set_remote'"})">
            ${isRemote ? 'Set Auto' : 'Set Remot'}
          </button>
          <button class="btn btn-off" onclick="deleteOutput(${id})">Eliminar</button>
        </div>
      </div>`;
  }).join('');
}

// ── Accions rapides ────────────────────────────────────────────────
function ctrlAction(id, action) {
  fetch('/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify([{id, action}])
  });
}

function deleteOutput(id) {
  fetch('/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify([{id, action: 'delete'}])
  });
}

// ── Log ────────────────────────────────────────────────────────────
function addLog(t, src, sig, detail) {
  const colors = {ControlRemot: '#00d4ff', ControlHorari: '#4caf50', HttpServer: '#ff9800', WS: '#f44'};
  const color = colors[src] || '#aaa';
  const srcTag  = `<span style="color:${color};font-weight:600">[${src}]</span>`;
  const sigTag  = `<span style="color:#888">${sig}</span>`;
  logEl.innerHTML = `<div class="log-entry"><span class="time">${t}</span> ${srcTag} ${sigTag} ${detail}</div>` + logEl.innerHTML;
}

</script>
</body>
</html>
